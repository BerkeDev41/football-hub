# One-click-ish deploy to Render (https://render.com).
services:
  - type: web
    name: footballhub-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: API_SPORTS_KEY
        sync: false
      - key: APP_TOKEN
        sync: false
